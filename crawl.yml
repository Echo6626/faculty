name: Crawl & Deploy to Pages

on:
  # 수동 실행만 (Actions 탭 → "Run workflow")
  workflow_dispatch:
    inputs:
      dept:
        description: '부서 키 (빈칸 = 전체, 예: ee,cse,mse)'
        required: false
        default: ''
      skip_papers:
        description: '논문 수집 제외 (빠름)'
        type: boolean
        default: false

  # static/ 직접 수정 후 push 시 Pages만 재배포
  push:
    branches: [main]
    paths:
      - 'static/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: 크롤링 + JSON 내보내기 ─────────────────────────────────────────
  crawl:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: |
          DEPT="${{ github.event.inputs.dept }}"
          SKIP="${{ github.event.inputs.skip_papers }}"

          ARGS=""
          [ -n "$DEPT" ] && ARGS="--dept $DEPT"
          [ "$SKIP" = "true" ] && ARGS="$ARGS --no-papers"

          echo "Running: python crawler.py $ARGS"
          python crawler.py $ARGS

      - name: Export to JSON
        run: python export.py

      - name: Show stats
        run: |
          python3 -c "
          import json
          with open('static/data.json') as f:
              d = json.load(f)
          papers = sum(len(p.get('papers',[])) for p in d['professors'])
          print(f'✓  {len(d[\"professors\"])} professors, {papers} papers')
          print(f'   Generated at: {d[\"generated_at\"]}')
          "

      - name: Commit data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add static/data.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update faculty data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

  # ── Job 2: GitHub Pages 배포 ───────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [crawl]
    if: always() && (needs.crawl.result == 'success' || github.event_name == 'push')

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload static/
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
